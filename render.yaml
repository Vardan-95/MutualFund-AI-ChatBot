# Optional Render Blueprint — import when creating the service, or mirror these in the dashboard.
services:
  - type: web
    name: mutualfund-ai-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-api.txt
    startCommand: python -m runtime.phase_9_api
    envVars:
      - key: PYTHONPATH
        value: .
      - key: API_HOST
        value: 0.0.0.0
      - key: API_CORS_ALLOW_VERCEL_PREVIEWS
        value: "1"
      - key: API_CORS_ORIGINS
        value: https://mutual-fund-ai-chat-bot.vercel.app,http://localhost:3000
      # Free tier has ~512MB RAM — skip PyTorch embedding model on the API (BM25 still works).
      - key: API_SPARSE_ONLY
        value: "1"
      - key: CHROMA_API_KEY
        sync: false
      - key: CHROMA_TENANT
        sync: false
      - key: CHROMA_DATABASE
        sync: false
      - key: GROQ_API_KEY
        sync: false
