# Daily pipeline (9:15 AM IST): scrape → chunk → embed (Chroma Cloud) → BM25 → push to main
# Push to main triggers Render auto-deploy (enable Auto-Deploy on Render for branch main).
# See Docs/RAG_Architecture.md §4.8 and phases/p0b_scheduler/README.md

name: Daily corpus refresh

on:
  schedule:
    # 9:15 AM IST = 03:45 UTC
    - cron: "45 3 * * *"
  workflow_dispatch:
    inputs:
      force_scrape:
        description: Run scrape (always runs; reserved for future use)
        type: boolean
        default: false
      force_reindex:
        description: Run chunk+embed even if scrape reports no hash change
        type: boolean
        default: false

concurrency:
  group: daily-corpus-refresh
  cancel-in-progress: false

jobs:
  scrape:
    name: "1/3 Scrape latest Groww pages"
    runs-on: ubuntu-latest
    outputs:
      corpus_changed: ${{ steps.scrape.outputs.corpus_changed }}
      scrape_run_id: ${{ steps.scrape.outputs.scrape_run_id }}
      success_count: ${{ steps.scrape.outputs.success_count }}
      failed_count: ${{ steps.scrape.outputs.failed_count }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-scrape.txt
            requirements-ingest.txt

      - name: Install scrape dependencies
        run: pip install -r requirements-scrape.txt

      - name: Scrape all schemes from sources.yaml
        id: scrape
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m jobs.scrape --json

      - name: Upload corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpus-md
          path: data/corpus/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload facts artifact
        uses: actions/upload-artifact@v4
        with:
          name: scheme-facts
          path: data/facts/
          if-no-files-found: warn
          retention-days: 30

  chunk-and-embed:
    name: "2/3 Chunk, embed, update Chroma Cloud"
    needs: scrape
    # Scheduled run (9:15 AM IST): always re-chunk + re-embed after scrape.
    # Manual run: only if corpus_changed or force_reindex.
    if: |
      needs.scrape.result == 'success' &&
      needs.scrape.outputs.success_count != '0' &&
      (
        github.event_name == 'schedule' ||
        needs.scrape.outputs.corpus_changed == 'true' ||
        inputs.force_reindex == true
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: corpus-md
          path: data/corpus

      - uses: actions/download-artifact@v4
        with:
          name: scheme-facts
          path: data/facts

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ingest.txt

      - name: Install ingest dependencies
        run: pip install -r requirements-ingest.txt

      - name: Chunk → embed (BGE) → Chroma Cloud → BM25
        id: ingest
        env:
          PYTHONPATH: ${{ github.workspace }}
          EMBEDDING_PROVIDER: local
          EMBEDDING_MODEL: BAAI/bge-small-en-v1.5
          EMBEDDING_DIMENSIONS: "384"
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          CHROMA_HOST: ${{ secrets.CHROMA_HOST }}
        run: |
          set -e
          echo "Pipeline: chunk → embed → upsert Chroma Cloud collection mutual_fund_chunks → BM25"
          ARGS="--json --force"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.force_reindex }}" = "true" ]; then
            ARGS="$ARGS --force-reembed"
          fi
          python -m jobs.ingest $ARGS

      - name: Workflow summary
        if: always() && steps.ingest.outcome == 'success'
        run: |
          echo "## Ingest complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Embeddings: **Chroma Cloud** (\`mutual_fund_chunks\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Local index: chunks.jsonl, bm25/, manifests" >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/index/ingestion_manifest.json ]; then
            echo "- corpus_version: $(jq -r .corpus_version data/index/ingestion_manifest.json)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f data/index/embeddings_manifest.json ]; then
            echo "- embedding_model: $(jq -r .embedding_model data/index/embeddings_manifest.json)" >> "$GITHUB_STEP_SUMMARY"
            echo "- chunk_count: $(jq -r .chunk_count data/index/embeddings_manifest.json)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload index bundle
        uses: actions/upload-artifact@v4
        with:
          name: index-bundle
          path: |
            data/index/chunks.jsonl
            data/index/bm25/
            data/index/embeddings_manifest.json
            data/index/ingestion_manifest.json
          if-no-files-found: error
          retention-days: 30

  skip-ingest-notice:
    name: Ingest skipped (no corpus change)
    needs: scrape
    if: |
      needs.scrape.result == 'success' &&
      github.event_name != 'schedule' &&
      needs.scrape.outputs.corpus_changed != 'true' &&
      inputs.force_reindex != true
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## Ingest skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "Manual run: scrape reported no content hash change. Enable **force_reindex** to chunk and update Chroma anyway." >> "$GITHUB_STEP_SUMMARY"

  push-to-main:
    name: "3/3 Push data to main (Render auto-deploy)"
    needs: [scrape, chunk-and-embed]
    if: |
      needs.scrape.result == 'success' &&
      needs.chunk-and-embed.result == 'success' &&
      needs.scrape.outputs.success_count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - uses: actions/download-artifact@v4
        with:
          name: corpus-md
          path: data/corpus

      - uses: actions/download-artifact@v4
        with:
          name: scheme-facts
          path: data/facts

      - uses: actions/download-artifact@v4
        with:
          name: index-bundle
          path: data/index

      - name: Commit and push refreshed corpus + index
        env:
          SCRAPE_RUN_ID: ${{ needs.scrape.outputs.scrape_run_id }}
        run: |
          set -e
          git add data/corpus data/facts
          git add data/index/chunks.jsonl data/index/bm25 data/index/ingestion_manifest.json data/index/embeddings_manifest.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            echo "## No git changes" >> "$GITHUB_STEP_SUMMARY"
            echo "Scrape/ingest produced identical hashes; Render deploy not required." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          VERSION="$(jq -r .corpus_version data/index/ingestion_manifest.json 2>/dev/null || echo unknown)"
          git commit -m "chore(data): daily corpus refresh (v${VERSION}, scrape ${SCRAPE_RUN_ID})"
          git push origin main

      - name: Trigger Render deploy hook (optional)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            echo "Calling Render deploy hook..."
            curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
            echo "Render deploy hook accepted."
          else
            echo "RENDER_DEPLOY_HOOK not set; relying on Render GitHub auto-deploy."
          fi

      - name: Push summary
        run: |
          echo "## Pushed to main" >> "$GITHUB_STEP_SUMMARY"
          echo "Render will deploy from this commit if **Auto-Deploy** is enabled for branch \`main\` (~10–20 min on free tier)." >> "$GITHUB_STEP_SUMMARY"
          echo "corpus_version: $(jq -r .corpus_version data/index/ingestion_manifest.json)" >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    name: Notify on failure
    needs: [scrape, chunk-and-embed, push-to-main]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - run: echo "::error::Daily corpus refresh failed. Check scrape, ingest (Chroma secrets), push-to-main, or Render deploy."
