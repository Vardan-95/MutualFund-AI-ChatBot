provider: local
model: BAAI/bge-small-en-v1.5
dimensions: 384
batch_size: 32
max_retries: 3
retry_backoff_seconds: 2
normalize_vectors: true
prefix_scheme_name: false
cache_dir: data/index/embed_cache
collection_name: mutual_fund_chunks
# Vector store: Chroma Cloud (https://www.trychroma.com/) — see Docs/Chunking_Embedding_Architecture.md §5.7
chroma_mode: cloud
# chroma_cloud_host: api.trychroma.com   # optional; set CHROMA_HOST env for other regions
